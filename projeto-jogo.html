<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Pokédex</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="menu">
        <h2>Pokédex</h2>
        <ul>
            <li>Início</li>
            <li>Regiões</li>
            <li>Batalha</li>
        </ul>
    </nav>

    <header class="capa">
        <h1>Escolha seu Pokémon Inicial</h1>
    </header>

    <main class="galeria-pokemon">
        <div class="cartao">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="Bulbasaur" width="150">
            <div class="selo-cp">CP 798</div>
            <h3>Bulbasaur</h3>

            <div class="tipos">
                <span class="badge planta">Planta</span>
                <span class="badge veneno">Veneno</span>
            </div>

            <div class="atributos">
                <div class="linha-status">
                    <span>HP</span>
                    <div class="barra-fundo"><div class="barra-energia hp" style="width: 45%"></div></div>
                </div>
                <div class="linha-status">
                    <span>Ataque</span>
                    <div class="barra-fundo"><div class="barra-energia ataque" style="width: 65%"></div></div>
                </div>
            </div>

            <button class="btn-treinar">Testar Performance</button>
        </div>

        <div class="cartao">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" alt="Charmander" width="150">
            <div class="selo-cp">CP 1500</div>
            <h3>Charmander</h3>

            <div class="tipos">
                <span class="badge fogo">Fogo</span>
            </div>

            <div class="atributos">
                <div class="linha-status">
                    <span>HP</span>
                    <div class="barra-fundo"><div class="barra-energia hp" style="width: 60%"></div></div>
                </div>
                <div class="linha-status">
                    <span>Ataque</span>
                    <div class="barra-fundo"><div class="barra-energia ataque" style="width: 95%"></div></div>
                </div>
            </div>

            <button class="btn-treinar">Testar Performance</button>
        </div>

        <div class="cartao">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" alt="Squirtle" width="150">
            <div class="selo-cp">CP 1245</div>
            <h3>Squirtle</h3>
            
            <div class="tipos">
                <span class="badge agua">Água</span>
            </div>

            <div class="atributos">
                <div class="linha-status">
                    <span>HP</span>
                    <div class="barra-fundo"><div class="barra-energia hp" style="width: 100%"></div></div>
                </div>
                <div class="linha-status">
                    <span>Ataque</span>
                    <div class="barra-fundo"><div class="barra-energia ataque" style="width: 40%"></div></div>
                </div>
            </div>

            <button class="btn-treinar">Testar Performance</button>
        </div>
    </main>
</body>
</html>
